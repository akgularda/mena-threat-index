name: MTI Pipeline
on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:
permissions:
  contents: write
  pages: write
  id-token: write
concurrency:
  group: pipeline
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run pipeline
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: python -m pipeline.run
      - name: Commit data
        run: |
          git config user.name "mti-bot"
          git config user.email "actions@github.com"
          git add mena_data.json data/
          if git diff --cached --quiet; then
            echo "no data changes"; exit 0
          fi
          git commit -m "data: ${GITHUB_RUN_ID} [auto]"
          # main can advance during a run (merges, manual commits); rebase our data
          # commit onto the new tip and retry, instead of failing on a stale push.
          for attempt in 1 2 3; do
            if git pull --rebase --autostash origin main && git push; then
              exit 0
            fi
            echo "push attempt ${attempt} failed (main moved?) — retrying"; sleep $((RANDOM % 5 + 3))
          done
          echo "::error::failed to push data after 3 attempts"; exit 1
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - uses: actions/deploy-pages@v4
