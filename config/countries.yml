# MENA Threat Index — country & feed configuration (24 countries).
#
# name      : display name (also the key used in mena_data.json)
# map_name  : EXACT properties.name in world-atlas countries-50m.json (map join key)
# iso2      : ISO 3166-1 alpha-2
# lang      : dominant local language (drives the local-language Google News query)
# weight    : strategic weight in the composite (relative importance / exposure)
# feeds     : curated outlet RSS/Atom (best-effort; may 403 from CI IPs)
# gnews     : Google News RSS queries (the guaranteed coverage layer). The pipeline
#             appends the recency operator (when:Nd) from settings.ingest.window_hours.
#
# Pan-regional feeds in `shared_feeds` are fetched once and attributed to a country
# when the headline mentions it (keyword match), so we don't refetch them per country.

shared_feeds:
  - { url: "https://www.aljazeera.com/xml/rss/all.xml", source: "Al Jazeera", lang: en }
  - { url: "https://www.middleeasteye.net/rss", source: "Middle East Eye", lang: en }
  - { url: "https://www.newarab.com/rss", source: "The New Arab", lang: en }
  - { url: "https://www.al-monitor.com/rss", source: "Al-Monitor", lang: en }

# Attribution terms for the broad Google-News layer: a result is attributed to a
# country only if its title names the country (English or native script) and
# contains no excluded ambiguous term. Empty/absent -> no filtering (no regression).
# (METHODOLOGY_REVIEW F2 / PATCH_PLAN P13 follow-up)
attribution:
  Egypt:                { match: ["Egypt", "مصر"] }
  Iran:                 { match: ["Iran", "ایران", "Tehran"] }
  Iraq:                 { match: ["Iraq", "العراق"] }
  Israel:               { match: ["Israel", "ישראל"] }
  Syria:                { match: ["Syria", "سوريا"] }
  Lebanon:              { match: ["Lebanon", "لبنان"] }
  Jordan:               { match: ["Jordan", "الأردن"] }
  Saudi Arabia:         { match: ["Saudi Arabia", "Saudi", "السعودية"] }
  Yemen:                { match: ["Yemen", "اليمن"] }
  United Arab Emirates: { match: ["United Arab Emirates", "UAE", "Emirates", "الإمارات"] }
  Qatar:                { match: ["Qatar", "قطر"] }
  Kuwait:               { match: ["Kuwait", "الكويت"] }
  Bahrain:              { match: ["Bahrain", "البحرين"] }
  Oman:                 { match: ["Oman", "سلطنة عمان", "مسقط", "عُمان"], exclude: ["Amman", "عمّان"] }
  Palestine:            { match: ["Palestine", "Gaza", "West Bank", "فلسطين"] }
  Libya:                { match: ["Libya", "ليبيا"] }
  Tunisia:              { match: ["Tunisia", "تونس"] }
  Algeria:              { match: ["Algeria", "الجزائر"] }
  Morocco:              { match: ["Morocco", "المغرب"] }
  Turkey:               { match: ["Turkey", "Türkiye"] }
  Sudan:                { match: ["Sudan", "السودان"], exclude: ["South Sudan"] }
  Mauritania:           { match: ["Mauritania", "موريتانيا"] }
  Djibouti:             { match: ["Djibouti"] }
  Somalia:              { match: ["Somalia", "الصومال"] }

countries:
  - name: Egypt
    map_name: Egypt
    iso2: EG
    lang: ar
    weight: 1.3
    feeds:
      - { url: "https://www.egyptindependent.com/feed/", source: "Egypt Independent", lang: en }
    gnews:
      - { q: '"Egypt"', hl: en-US, gl: US, ceid: "US:en" }
      - { q: 'مصر', hl: ar, gl: EG, ceid: "EG:ar" }

  - name: Iran
    map_name: Iran
    iso2: IR
    lang: fa
    weight: 1.5
    feeds:
      - { url: "https://www.tehrantimes.com/rss", source: "Tehran Times", lang: en }
      - { url: "https://www.presstv.ir/rss.xml", source: "Press TV", lang: en }
    gnews:
      - { q: '"Iran"', hl: en-US, gl: US, ceid: "US:en" }
      - { q: 'ایران', hl: fa, gl: IR, ceid: "IR:fa" }

  - name: Iraq
    map_name: Iraq
    iso2: IQ
    lang: ar
    weight: 1.3
    feeds: []
    gnews:
      - { q: '"Iraq"', hl: en-US, gl: US, ceid: "US:en" }
      - { q: 'العراق', hl: ar, gl: IQ, ceid: "IQ:ar" }

  - name: Israel
    map_name: Israel
    iso2: IL
    lang: he
    weight: 1.5
    feeds:
      - { url: "https://www.jpost.com/rss/rssfeedsfrontpage.aspx", source: "Jerusalem Post", lang: en }
    gnews:
      - { q: '"Israel"', hl: en-US, gl: US, ceid: "US:en" }
      - { q: 'ישראל', hl: he, gl: IL, ceid: "IL:he" }

  - name: Syria
    map_name: Syria
