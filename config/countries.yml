    lang: ar
    weight: 1.4
    feeds: []
    gnews:
      - { q: '"Syria"', hl: en-US, gl: US, ceid: "US:en" }
      - { q: 'سوريا', hl: ar, gl: SY, ceid: "SY:ar" }

  - name: Lebanon
    map_name: Lebanon
    iso2: LB
    lang: ar
    weight: 1.1
    feeds: []
    gnews:
      - { q: '"Lebanon"', hl: en-US, gl: US, ceid: "US:en" }
      - { q: 'لبنان', hl: ar, gl: LB, ceid: "LB:ar" }

  - name: Jordan
